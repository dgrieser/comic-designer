<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Comic Designer</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <aside class="panel">
        <button id="togglePanelBtn" class="panel-toggle" type="button" aria-expanded="true">Collapse controls</button>
        <div id="panelContent">
          <h1>Comic Designer</h1>

          <section>
            <label for="imageLoader">Load image</label>
            <input id="imageLoader" type="file" accept="image/*" />
          </section>

          <section class="buttons">
            <button id="addBubbleBtn" disabled>Add speech bubble</button>
            <button id="exportBtn" disabled>Export PNG</button>
          </section>

          <section>
            <h2>Selected bubble</h2>
            <div class="grid">
              <label>Shape
                <select id="shape">
                  <option value="speech-left">Speech (tail left)</option>
                  <option value="speech-right">Speech (tail right)</option>
                  <option value="scream">Screaming</option>
                  <option value="intro">Intro box</option>
                </select>
              </label>

              <label>Line width
                <input id="lineWidth" type="number" min="1" max="20" value="3" />
              </label>

              <label>Line color
                <input id="lineColor" type="color" value="#111111" />
              </label>

              <label>Background color
                <input id="bgColor" type="color" value="#ffffff" />
              </label>

              <label>Opacity
                <input id="bgOpacity" type="range" min="0" max="1" step="0.01" value="1" />
              </label>

              <label>Font color
                <input id="fontColor" type="color" value="#111111" />
              </label>

              <label>Font size
                <input id="fontSize" type="number" min="10" max="120" value="28" />
              </label>

              <label>Font
                <select id="fontFamily">
                  <option value="'Comic Sans MS', 'Comic Neue', cursive">Comic Sans</option>
                  <option value="Arial, sans-serif">Arial</option>
                  <option value="'Helvetica Neue', Helvetica, Arial, sans-serif">Helvetica</option>
                  <option value="Georgia, serif">Georgia</option>
                  <option value="Impact, Haettenschweiler, 'Arial Narrow Bold', sans-serif">Impact</option>
                </select>
              </label>

              <label>Text align
                <select id="textAlign">
                  <option value="left">Left</option>
                  <option value="center">Center</option>
                  <option value="right">Right</option>
                </select>
              </label>
            </div>
            <p class="hint">Double-click bubble text to edit. Enter creates line breaks.</p>
          </section>
        </div>
      </aside>

      <section class="workspace-wrap">
        <div id="workspace" class="workspace">
          <img id="bgImage" alt="Comic background" hidden />
          <div id="bubbleLayer"></div>
        </div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
